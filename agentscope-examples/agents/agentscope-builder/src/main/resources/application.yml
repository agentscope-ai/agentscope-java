server:
  port: 8080

spring:
  application:
    name: agentscope-builder
  webflux:
    static-path-pattern: /**
  resources:
    static-locations:
      - classpath:/static/

# --------------------------------------------------------------------------
# agentscope-builder configuration
#
# Property prefix is `builder.*`. The legacy `claw.*` prefix and `CLAW_*` env
# vars remain readable as a fallback for migration; new deployments should
# use `builder.*` / `BUILDER_*`.
# --------------------------------------------------------------------------
builder:
  # JWT signing secret (>= 32 chars). MUST be overridden in production.
  jwt:
    secret: ${BUILDER_JWT_SECRET:${CLAW_JWT_SECRET:builder-default-dev-secret-change-in-production-32chars}}

  # Working directory. If blank, defaults to the JVM's current working directory.
  # .agentscope/agentscope.json is read from (or auto-created in) this directory.
  workspace: ${BUILDER_WORKSPACE:${CLAW_WORKSPACE:}}

  # ---- Workspace storage topology (multi-tenant filesystem) ----
  # fs-spec selects how per-(user, agent) workspaces are backed:
  #   local    — LocalFilesystem rooted at the agent workspace, with per-agent
  #              namespacing via NamespaceFactory (default; no extra infra).
  #   sandbox  — local workspace store + SandboxBackedFilesystem for agent runtime.
  #              Requires builder.sandbox.enabled=true.
  #   remote   — RemoteFilesystem backed by a BaseStore bean for distributed
  #              deployments. Requires a BaseStore bean (e.g. Redis, OSS).
  workspace-store:
    fs-spec: ${BUILDER_WORKSPACE_FS_SPEC:local}
    local:
      max-file-size-mb: 10

  # ---- Sandbox mode (Docker-based agent isolation) ----
  # When enabled, agents run inside Docker containers with workspace projection.
  # The web API workspace endpoints continue managing projected files on the host.
  sandbox:
    enabled: ${BUILDER_SANDBOX_ENABLED:false}
    image: ${BUILDER_SANDBOX_IMAGE:agentscope/python-sandbox:py311-slim}
    network: ${BUILDER_SANDBOX_NETWORK:none}
    workspace-root: ${BUILDER_SANDBOX_WORKSPACE_ROOT:/workspace}
    isolation: ${BUILDER_SANDBOX_ISOLATION:USER}
    projection-roots: ${BUILDER_SANDBOX_PROJECTION_ROOTS:AGENTS.md,skills,subagents,knowledge}
    cpu-count: ${BUILDER_SANDBOX_CPU_COUNT:0}
    memory-bytes: ${BUILDER_SANDBOX_MEMORY_BYTES:0}

  # ---- DashScope model (used when no Model Spring bean is present) ----
  # Set DASHSCOPE_API_KEY env var or override api-key below.
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model-name: ${BUILDER_MODEL_NAME:${CLAW_MODEL_NAME:qwen-max}}
    stream: true

  # ---- Agent defaults (used when auto-generating agentscope.json) ----
  agent:
    name: ${BUILDER_AGENT_NAME:${CLAW_AGENT_NAME:builder-agent}}
    sys-prompt: >
      You are a helpful assistant built with AgentScope Builder.
      Answer in Chinese when the user speaks Chinese, otherwise answer in English.

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    io.agentscope: INFO
    org.springframework.security: WARN
