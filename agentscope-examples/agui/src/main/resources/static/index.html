<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope AG-UI Demo</title>
    <style>
        :root {
            --bg-primary: #1a1b26;
            --bg-secondary: #24283b;
            --bg-tertiary: #414868;
            --text-primary: #c0caf5;
            --text-secondary: #9aa5ce;
            --accent-blue: #7aa2f7;
            --accent-green: #9ece6a;
            --accent-orange: #ff9e64;
            --accent-red: #f7768e;
            --accent-cyan: #00BCD4;
            --border-color: #414868;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        #messages {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            min-height: 400px;
            max-height: 60vh;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: var(--bg-tertiary);
            margin-left: 40px;
        }

        .message.assistant {
            background: linear-gradient(135deg, rgba(122, 162, 247, 0.1), rgba(158, 206, 106, 0.1));
            border-left: 3px solid var(--accent-blue);
            margin-right: 40px;
        }

        .message.tool {
            background: rgba(255, 158, 100, 0.1);
            border-left: 3px solid var(--accent-orange);
            margin: 0 60px 16px 60px;
            font-size: 0.85rem;
        }

        .message.reasoning {
            background: rgba(158, 206, 106, 0.08);
            border-left: 3px solid var(--accent-green);
            margin: 0 60px 16px 60px;
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.9;
        }

        .message.error {
            background: rgba(247, 118, 142, 0.1);
            border-left: 3px solid var(--accent-red);
        }

        .message.custom {
            background: rgba(0, 188, 212, 0.08);
            border-left: 3px solid var(--accent-cyan);
            margin: 0 60px 16px 60px;
            font-size: 0.85rem;
        }

        .message-role {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .message.user .message-role { color: var(--text-secondary); }
        .message.assistant .message-role { color: var(--accent-blue); }
        .message.tool .message-role { color: var(--accent-orange); }
        .message.reasoning .message-role { color: var(--accent-green); }
        .message.custom .message-role { color: var(--accent-cyan); }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        #input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(122, 162, 247, 0.2);
        }

        #input::placeholder {
            color: var(--text-secondary);
        }

        #send-btn, #stop-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #send-btn {
            background: linear-gradient(135deg, var(--accent-blue), #5a8af7);
        }

        #send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(122, 162, 247, 0.3);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #stop-btn {
            background: linear-gradient(135deg, var(--accent-red), #e05555);
        }

        #stop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 118, 142, 0.3);
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        footer {
            text-align: center;
            padding: 16px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
        }

        footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .status-dot.disconnected {
            background: var(--accent-red);
        }

        .demo-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .demo-actions button, .approval-actions button {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: inherit;
            cursor: pointer;
        }

        .demo-actions button:hover, .approval-actions button:hover {
            border-color: var(--accent-blue);
        }

        .approval-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .approval-actions .approve {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .approval-actions .reject {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AgentScope AG-UI Demo</h1>
            <p>Chat with an AI agent via the AG-UI protocol</p>
        </header>

        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>

        <div class="demo-actions">
            <button id="approval-demo-btn">HITL interrupt（点击测试）</button>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type a message... (Press Enter to send)" autocomplete="off">
            <button id="send-btn">Send</button>
            <button id="stop-btn" style="display: none;">Stop</button>
        </div>
    </div>

    <footer>
        Powered by <a href="https://agentscope.io" target="_blank">AgentScope</a> &middot;
        AG-UI Protocol &middot;
        <a href="https://docs.ag-ui.com" target="_blank">Documentation</a>
    </footer>

    <script src="/js/agui-client.js"></script>
    <script>
        const client = new AguiClient('/agui/run');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const approvalDemoBtn = document.getElementById('approval-demo-btn');
        const messages = document.getElementById('messages');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let threadId = 'thread-' + Date.now();
        let messageHistory = [];
        let isRunning = false;
        let activeToolCalls = new Map();
        let pendingApproval = null;

        const frontendTools = [{
            name: 'request_approval',
            description: 'Ask the user to approve or reject an action before continuing. Always call this tool when the user asks for the approval interrupt demo.',
            parameters: {
                type: 'object',
                properties: {
                    action: {
                        type: 'string',
                        description: 'The action that needs user approval.'
                    },
                    reason: {
                        type: 'string',
                        description: 'Why the action needs approval.'
                    }
                },
                required: ['action']
            }
        }];

        function setStatus(status, text) {
            statusDot.className = 'status-dot' + (status === 'error' ? ' disconnected' : '');
            statusText.textContent = text;
        }

        let currentAssistantDiv = null;
        let currentReasoningDiv = null;

        function appendMessage(role, content, append = false) {
            if (append && role === 'assistant' && currentAssistantDiv) {
                // Append to current assistant message
                const contentEl = currentAssistantDiv.querySelector('.message-content');
                contentEl.textContent += content;
                messages.scrollTop = messages.scrollHeight;
                return;
            }

            if (append && role === 'reasoning' && currentReasoningDiv) {
                // Append to current reasoning message
                const contentEl = currentReasoningDiv.querySelector('.message-content');
                contentEl.textContent += content;
                messages.scrollTop = messages.scrollHeight;
                return;
            }

            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-role">${role}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;

            if (role === 'assistant') {
                currentAssistantDiv = div;
            } else if (role === 'reasoning') {
                currentReasoningDiv = div;
            }
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'typing-indicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatCustomEvent(event) {
            if (event.name === 'token_usage') {
                const delta = event.value?.delta || {};
                const cumulative = event.value?.cumulative || {};
                return [
                    'Token usage',
                    `delta: input=${delta.inputTokens ?? 0}, output=${delta.outputTokens ?? 0}, total=${delta.totalTokens ?? 0}`,
                    `cumulative: input=${cumulative.inputTokens ?? 0}, output=${cumulative.outputTokens ?? 0}, total=${cumulative.totalTokens ?? 0}`
                ].join('\n');
            }

            return `${event.name}\n${JSON.stringify(event.value ?? {}, null, 2)}`;
        }

        function parseToolArgs(rawArgs) {
            if (!rawArgs) return {};
            try {
                return JSON.parse(rawArgs);
            } catch (error) {
                return { raw: rawArgs };
            }
        }

        function appendApprovalDialog(interrupt) {
            const toolCall = activeToolCalls.get(interrupt.toolCallId) || {};
            const args = parseToolArgs(toolCall.args);
            const div = document.createElement('div');
            div.className = 'message tool';
            div.innerHTML = `
                <div class="message-role">approval required</div>
                <div class="message-content">${escapeHtml([
                    `toolCallId: ${interrupt.toolCallId}`,
                    `tool: ${toolCall.name || interrupt.metadata?.toolName || 'request_approval'}`,
                    `action: ${args.action || '(not provided)'}`,
                    args.reason ? `reason: ${args.reason}` : null,
                    interrupt.message ? `message: ${interrupt.message}` : null
                ].filter(Boolean).join('\n'))}</div>
                <div class="approval-actions">
                    <button class="approve" type="button">Approve</button>
                    <button class="reject" type="button">Reject</button>
                </div>
            `;
            div.querySelector('.approve').addEventListener('click', () => resolveApproval(true, div));
            div.querySelector('.reject').addEventListener('click', () => resolveApproval(false, div));
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function resolveApproval(approved, dialog) {
            if (!pendingApproval || isRunning) return;

            const interrupt = pendingApproval;
            const toolCall = activeToolCalls.get(interrupt.toolCallId) || {};
            const args = parseToolArgs(toolCall.args);
            const content = JSON.stringify({
                approved,
                action: args.action || null,
                reason: approved ? 'Approved in the AG-UI example dialog.' : 'Rejected in the AG-UI example dialog.'
            });
            const toolMessage = {
                id: 'tool-msg-' + Date.now(),
                role: 'tool',
                toolCallId: interrupt.toolCallId,
                content
            };

            dialog.querySelectorAll('button').forEach(button => button.disabled = true);
            const actions = dialog.querySelector('.approval-actions');
            if (actions) {
                actions.remove();
            }
            appendMessage('tool', `${approved ? 'Approved' : 'Rejected'} request_approval\n${content}`);
            messageHistory.push(toolMessage);
            pendingApproval = null;

            await runAgent([toolMessage]);
        }

        function handleRunFinished(event) {
            const interrupts = event?.outcome?.type === 'interrupt' ? event.outcome.interrupts || [] : [];
            const toolInterrupt = interrupts.find(item => item.reason === 'tool_call' && item.toolCallId);
            if (!toolInterrupt) {
                setStatus('ready', 'Ready');
                return;
            }

            pendingApproval = toolInterrupt;
            setStatus('waiting', 'Awaiting approval');
            appendApprovalDialog(toolInterrupt);
        }

        async function runAgent(messagesForServer) {
            isRunning = true;
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            approvalDemoBtn.disabled = true;
            setStatus('running', 'Running...');
            showTypingIndicator();

            let assistantContent = '';
            let currentMessageId = null;
            let reasoningContent = '';

            try {
                await client.run({
                    threadId: threadId,
                    runId: 'run-' + Date.now(),
                    messages: messagesForServer,
                    tools: frontendTools
                }, {
                    onRunStarted: () => {
                        console.log('Run started');
                        currentAssistantDiv = null;
                        currentReasoningDiv = null;
                        reasoningContent = '';
                    },
                    onReasoningMessageStart: (messageId, role) => {
                        console.log('Reasoning message start:', messageId, role);
                        hideTypingIndicator();
                        reasoningContent = '';
                        currentReasoningDiv = null;
                    },
                    onReasoningContent: (delta, messageId) => {
                        console.log('Reasoning content delta:', delta);
                        if (reasoningContent === '') {
                            appendMessage('reasoning', delta);
                        } else {
                            appendMessage('reasoning', delta, true);
                        }
                        reasoningContent += delta;
                    },
                    onReasoningMessageEnd: (messageId) => {
                        console.log('Reasoning message end:', messageId);
                        currentReasoningDiv = null;
                        reasoningContent = '';
                    },
                    onTextMessageStart: (messageId, role) => {
                        console.log('Text message start:', messageId, role);
                        hideTypingIndicator();
                        currentMessageId = messageId;
                        assistantContent = '';
                        currentAssistantDiv = null;
                    },
                    onTextContent: (delta) => {
                        console.log('Text content delta:', delta);
                        if (assistantContent === '') {
                            appendMessage('assistant', delta);
                        } else {
                            appendMessage('assistant', delta, true);
                        }
                        assistantContent += delta;
                    },
                    onTextMessageEnd: (messageId) => {
                        console.log('Text message end:', messageId);
                        if (assistantContent) {
                            messageHistory.push({
                                id: messageId,
                                role: 'assistant',
                                content: assistantContent
                            });
                        }
                        currentAssistantDiv = null;
                    },
                    onToolCallStart: (toolCallId, toolName) => {
                        hideTypingIndicator();
                        currentAssistantDiv = null;
                        activeToolCalls.set(toolCallId, { name: toolName, args: '' });
                        appendMessage('tool', `Calling tool: ${toolName}`);
                    },
                    onToolCallArgs: (toolCallId, delta) => {
                        const toolCall = activeToolCalls.get(toolCallId) || { name: 'unknown', args: '' };
                        toolCall.args += delta || '';
                        activeToolCalls.set(toolCallId, toolCall);
                    },
                    onToolCallEnd: (toolCallId) => {
                        const toolCall = activeToolCalls.get(toolCallId);
                        if (toolCall?.args) {
                            appendMessage('tool', `Tool arguments for ${toolCall.name}\n${toolCall.args}`);
                        }
                    },
                    onToolCallResult: (toolCallId, content) => {
                        hideTypingIndicator();
                        appendMessage('tool', `Tool result for ${toolCallId}\n${content || '(empty)'}`);
                    },
                    onError: (error) => {
                        hideTypingIndicator();
                        appendMessage('error', `Error: ${error}`);
                    },
                    onCustomEvent: (event) => {
                        hideTypingIndicator();
                        appendMessage('custom', formatCustomEvent(event));
                    },
                    onRunFinished: (threadId, runId, event) => {
                        console.log('Run finished');
                        hideTypingIndicator();
                        handleRunFinished(event);
                    }
                });
            } catch (error) {
                console.error('Error during agent run:', error);
                hideTypingIndicator();

                if (error.name === 'AbortError') {
                    console.log('Run was stopped by user');
                    if (assistantContent) {
                        messageHistory.push({
                            id: currentMessageId || 'msg-stopped-' + Date.now(),
                            role: 'assistant',
                            content: assistantContent + ' [stopped]'
                        });
                    }
                    setStatus('ready', 'Stopped');
                } else {
                    appendMessage('error', `Error: ${error.message}`);
                    setStatus('error', 'Error');
                }
            } finally {
                console.log('Run complete, resetting state');
                isRunning = false;
                sendBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                approvalDemoBtn.disabled = false;
                hideTypingIndicator();
                currentAssistantDiv = null;
                currentReasoningDiv = null;
                reasoningContent = '';
                if (statusText.textContent === 'Running...') {
                    setStatus('ready', 'Ready');
                }
            }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isRunning) return;

            input.value = '';
            appendMessage('user', text);
            const userMessage = { id: 'msg-' + Date.now(), role: 'user', content: text };
            messageHistory.push(userMessage);
            await runAgent(messageHistory);
            return;

            isRunning = true;
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            setStatus('running', 'Running...');

            // Add user message
            appendMessage('user', text);
            messageHistory.push({ id: 'msg-' + Date.now(), role: 'user', content: text });

            // Show typing indicator
            showTypingIndicator();

            let assistantContent = '';
            let currentMessageId = null;
            let reasoningContent = '';
            let currentReasoningMessageId = null;
            let currentReasoningDiv = null;

            try {
                await client.run({
                    threadId: threadId,
                    runId: 'run-' + Date.now(),
                    messages: messageHistory
                }, {
                    onRunStarted: () => {
                        console.log('Run started');
                        currentAssistantDiv = null;
                        currentReasoningDiv = null;
                        reasoningContent = '';
                    },
                    onReasoningMessageStart: (messageId, role) => {
                        console.log('Reasoning message start:', messageId, role);
                        hideTypingIndicator();
                        currentReasoningMessageId = messageId;
                        reasoningContent = '';
                        currentReasoningDiv = null;
                    },
                    onReasoningContent: (delta, messageId) => {
                        console.log('Reasoning content delta:', delta);
                        if (reasoningContent === '') {
                            appendMessage('reasoning', delta);
                        } else {
                            appendMessage('reasoning', delta, true);
                        }
                        reasoningContent += delta;
                    },
                    onReasoningMessageEnd: (messageId) => {
                        console.log('Reasoning message end:', messageId);
                        currentReasoningDiv = null;
                        reasoningContent = '';
                    },
                    onTextMessageStart: (messageId, role) => {
                        console.log('Text message start:', messageId, role);
                        hideTypingIndicator();
                        currentMessageId = messageId;
                        assistantContent = '';
                        currentAssistantDiv = null;
                    },
                    onTextContent: (delta) => {
                        console.log('Text content delta:', delta);
                        if (assistantContent === '') {
                            appendMessage('assistant', delta);
                        } else {
                            appendMessage('assistant', delta, true);
                        }
                        assistantContent += delta;
                    },
                    onTextMessageEnd: (messageId) => {
                        console.log('Text message end:', messageId);
                        if (assistantContent) {
                            messageHistory.push({
                                id: messageId,
                                role: 'assistant',
                                content: assistantContent
                            });
                        }
                        currentAssistantDiv = null;
                    },
                    onToolCallStart: (toolCallId, toolName) => {
                        hideTypingIndicator();
                        currentAssistantDiv = null;
                        appendMessage('tool', `🔧 Calling tool: ${toolName}`);
                    },
                    onToolCallEnd: (toolCallId) => {
                        // Tool call completed
                    },
                    onError: (error) => {
                        hideTypingIndicator();
                        appendMessage('error', `Error: ${error}`);
                    },
                    onCustomEvent: (event) => {
                        hideTypingIndicator();
                        appendMessage('custom', formatCustomEvent(event));
                    },
                    onRunFinished: () => {
                        console.log('Run finished');
                        hideTypingIndicator();
                        setStatus('ready', 'Ready');
                    }
                });
            } catch (error) {
                console.error('Error during agent run:', error);
                hideTypingIndicator();

                // Check if this was a user-initiated abort
                if (error.name === 'AbortError') {
                    console.log('Run was stopped by user');
                    // Save whatever content we received before stopping
                    if (assistantContent) {
                        messageHistory.push({
                            id: currentMessageId || 'msg-stopped-' + Date.now(),
                            role: 'assistant',
                            content: assistantContent + ' [stopped]'
                        });
                    }
                    setStatus('ready', 'Stopped');
                } else {
                    appendMessage('error', `Error: ${error.message}`);
                    setStatus('error', 'Error');
                }
            } finally {
                console.log('Run complete, resetting state');
                isRunning = false;
                sendBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                hideTypingIndicator();
                currentAssistantDiv = null;
                currentReasoningDiv = null;
                reasoningContent = '';
                if (statusText.textContent === 'Running...') {
                    setStatus('ready', 'Ready');
                }
            }
        }

        // Stop button handler
        function stopGeneration() {
            if (isRunning) {
                console.log('User requested stop');
                setStatus('stopping', 'Stopping...');
                client.abort();
            }
        }

        function startApprovalDemo() {
            if (isRunning) return;
            input.value = 'Run the approval interrupt demo. Call request_approval for deleting demo-file.txt, then continue after the user decision.';
            sendMessage();
        }

        // Event listeners
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        sendBtn.addEventListener('click', sendMessage);
        stopBtn.addEventListener('click', stopGeneration);
        approvalDemoBtn.addEventListener('click', startApprovalDemo);

        // Focus input on load
        input.focus();
    </script>
</body>
</html>
