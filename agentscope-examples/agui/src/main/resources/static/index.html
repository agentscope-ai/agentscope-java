    <style>
        :root {

        #stop-btn, #stop-btn-tab2 {

<body>
<div class="container">
    <header>
        <h1>AgentScope AG-UI Demo</h1>
        <p>Chat with an AI agent via the AG-UI protocol</p>
    </header>

    <div class="tabs">
        <button class="tab-button active" data-tab="tab1">💬 Chat</button>
        <button class="tab-button" data-tab="tab2">✨ New Feature</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type a message... (Press Enter to send)" autocomplete="off">
            <button id="send-btn">Send</button>
            <button id="stop-btn" style="display: none;">Stop</button>
        </div>
    </div>

    <div id="tab2" class="tab-content">

        <div class="status">
            <div class="status-dot" id="status-dot-tab2"></div>
            <span id="status-text-tab2">Ready</span>
        </div>

        <div id="messages-tab2"></div>

        <div class="input-area">
            <input type="text" id="input-tab2" placeholder="Type a message in new tab... (Press Enter to send)" autocomplete="off">
            <button id="send-btn-tab2">Send</button>
            <button id="stop-btn-tab2" style="display: none;">Stop</button>
        </div>
    </div>
</div>

<footer>
    Powered by <a href="https://agentscope.io" target="_blank">AgentScope</a> &middot;
    AG-UI Protocol &middot;
    <a href="https://docs.ag-ui.com" target="_blank">Documentation</a>
</footer>

<script src="/js/agui-client.js"></script>
<script>
    // Tab switching functionality
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(button => {
        button.addEventListener('click', () => {
            const tabId = button.getAttribute('data-tab');

            // Remove active class from all buttons and contents
            tabButtons.forEach(btn => btn.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));

            // Add active class to clicked button and corresponding content
            button.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        });
    });

    // Tab 1 - Original Chat Functionality
    const client = new AguiClient('/agui/run');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const stopBtn = document.getElementById('stop-btn');
    const messages = document.getElementById('messages');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    let threadId = 'thread-' + Date.now();
    let messageHistory = [];
    let isRunning = false;

    function setStatus(status, text) {
        statusDot.className = 'status-dot' + (status === 'error' ? ' disconnected' : '');
        statusText.textContent = text;
    }

    let currentAssistantDiv = null;
    let currentReasoningDiv = null;

    function appendMessage(role, content, append = false) {
        if (append && role === 'assistant' && currentAssistantDiv) {
            const contentEl = currentAssistantDiv.querySelector('.message-content');
            contentEl.textContent += content;
            messages.scrollTop = messages.scrollHeight;
            return;
        }

        if (append && role === 'reasoning' && currentReasoningDiv) {
            const contentEl = currentReasoningDiv.querySelector('.message-content');
            contentEl.textContent += content;
            messages.scrollTop = messages.scrollHeight;
            return;
        }

        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
                <div class="message-role">${role}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;

        if (role === 'assistant') {
            currentAssistantDiv = div;
        } else if (role === 'reasoning') {
            currentReasoningDiv = div;
        }
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typing';
        div.className = 'typing-indicator';
        div.innerHTML = '<span></span><span></span><span></span>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function hideTypingIndicator() {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text || isRunning) return;

        input.value = '';
        isRunning = true;
        sendBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';
        setStatus('running', 'Running...');

        appendMessage('user', text);
        messageHistory.push({ id: 'msg-' + Date.now(), role: 'user', content: text });

        showTypingIndicator();

        let assistantContent = '';
        let currentMessageId = null;
        let reasoningContent = '';
        let currentReasoningMessageId = null;
        currentReasoningDiv = null;

        try {
            await client.run({
                threadId: threadId,
                runId: 'run-' + Date.now(),
                messages: messageHistory
            }, {
                onRunStarted: () => {
                    console.log('Run started');
                    currentAssistantDiv = null;
                    currentReasoningDiv = null;
                    reasoningContent = '';
                },
                onReasoningMessageStart: (messageId, role) => {
                    console.log('Reasoning message start:', messageId, role);
                    hideTypingIndicator();
                    currentReasoningMessageId = messageId;
                    reasoningContent = '';
                    currentReasoningDiv = null;
                },
                onReasoningContent: (delta, messageId) => {
                    console.log('Reasoning content delta:', delta);
                    if (reasoningContent === '') {
                        appendMessage('reasoning', delta);
                    } else {
                        appendMessage('reasoning', delta, true);
                    }
                    reasoningContent += delta;
                },
                onReasoningMessageEnd: (messageId) => {
                    console.log('Reasoning message end:', messageId);
                    currentReasoningDiv = null;
                    reasoningContent = '';
                },
                onTextMessageStart: (messageId, role) => {
                    console.log('Text message start:', messageId, role);
                    hideTypingIndicator();
                    currentMessageId = messageId;
                    assistantContent = '';
                    currentAssistantDiv = null;
                },
                onTextContent: (delta) => {
                    console.log('Text content delta:', delta);
                    if (assistantContent === '') {
                        appendMessage('assistant', delta);
                    } else {
                        appendMessage('assistant', delta, true);
                    }
                    assistantContent += delta;
                },
                onTextMessageEnd: (messageId) => {
                    console.log('Text message end:', messageId);
                    if (assistantContent) {
                        messageHistory.push({
                            id: messageId,
                            role: 'assistant',
                            content: assistantContent
                        });
                    }
                    currentAssistantDiv = null;
                },
                onToolCallStart: (toolCallId, toolName) => {
                    hideTypingIndicator();
                    currentAssistantDiv = null;
                    appendMessage('tool', `🔧 Calling tool: ${toolName}`);
                },
                onToolCallEnd: (toolCallId) => {
                    // Tool call completed
                },
                onError: (error) => {
                    hideTypingIndicator();
                    appendMessage('error', `Error: ${error}`);
                },
                onRunFinished: () => {
                    console.log('Run finished');
                    hideTypingIndicator();
                    setStatus('ready', 'Ready');
                }
            });
        } catch (error) {
            console.error('Error during agent run:', error);
            hideTypingIndicator();

            if (error.name === 'AbortError') {
                console.log('Run was stopped by user');
                if (assistantContent) {
                    messageHistory.push({
                        id: currentMessageId || 'msg-stopped-' + Date.now(),
                        role: 'assistant',
                        content: assistantContent + ' [stopped]'
                    });
                }
                setStatus('ready', 'Stopped');
            } else {
                appendMessage('error', `Error: ${error.message}`);
                setStatus('error', 'Error');
            }
        } finally {
            console.log('Run complete, resetting state');
            isRunning = false;
            sendBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            hideTypingIndicator();
            currentAssistantDiv = null;
            currentReasoningDiv = null;
            reasoningContent = '';
            if (statusText.textContent === 'Running...') {
                setStatus('ready', 'Ready');
            }
        }
    }

    function stopGeneration() {
        if (isRunning) {
            console.log('User requested stop');
            setStatus('stopping', 'Stopping...');
            client.abort();
        }
    }

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    sendBtn.addEventListener('click', sendMessage);
    stopBtn.addEventListener('click', stopGeneration);

    // Tab 2 - New Feature with same chat functionality
    const clientTab2 = new AguiClient('/agui/run/context');
    const inputTab2 = document.getElementById('input-tab2');
    const sendBtnTab2 = document.getElementById('send-btn-tab2');
    const stopBtnTab2 = document.getElementById('stop-btn-tab2');
    const messagesTab2 = document.getElementById('messages-tab2');
    const statusDotTab2 = document.getElementById('status-dot-tab2');
    const statusTextTab2 = document.getElementById('status-text-tab2');

    let threadIdTab2 = 'thread-tab2-' + Date.now();
    let messageHistoryTab2 = [];
    let isRunningTab2 = false;

    function setStatusTab2(status, text) {
        statusDotTab2.className = 'status-dot' + (status === 'error' ? ' disconnected' : '');
        statusTextTab2.textContent = text;
    }

    let currentAssistantDivTab2 = null;
    let currentReasoningDivTab2 = null;

    function appendMessageTab2(role, content, append = false) {
        if (append && role === 'assistant' && currentAssistantDivTab2) {
            const contentEl = currentAssistantDivTab2.querySelector('.message-content');
            contentEl.textContent += content;
            messagesTab2.scrollTop = messagesTab2.scrollHeight;
            return;
        }

        if (append && role === 'reasoning' && currentReasoningDivTab2) {
            const contentEl = currentReasoningDivTab2.querySelector('.message-content');
            contentEl.textContent += content;
            messagesTab2.scrollTop = messagesTab2.scrollHeight;
            return;
        }

        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
                <div class="message-role">${role}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
        messagesTab2.appendChild(div);
        messagesTab2.scrollTop = messagesTab2.scrollHeight;

        if (role === 'assistant') {
            currentAssistantDivTab2 = div;
        } else if (role === 'reasoning') {
            currentReasoningDivTab2 = div;
        }
    }

    function showTypingIndicatorTab2() {
        const div = document.createElement('div');
        div.id = 'typing-tab2';
        div.className = 'typing-indicator';
        div.innerHTML = '<span></span><span></span><span></span>';
        messagesTab2.appendChild(div);
        messagesTab2.scrollTop = messagesTab2.scrollHeight;
    }

    function hideTypingIndicatorTab2() {
        const typing = document.getElementById('typing-tab2');
        if (typing) typing.remove();
    }

    async function sendMessageTab2() {
        const text = inputTab2.value.trim();
        if (!text || isRunningTab2) return;

        inputTab2.value = '';
        isRunningTab2 = true;
        sendBtnTab2.style.display = 'none';
        stopBtnTab2.style.display = 'inline-block';
        setStatusTab2('running', 'Running...');

        appendMessageTab2('user', text);
        messageHistoryTab2.push({ id: 'msg-tab2-' + Date.now(), role: 'user', content: text });

        showTypingIndicatorTab2();

        let assistantContent = '';
        let currentMessageId = null;
        let reasoningContent = '';
        let currentReasoningMessageId = null;
        currentReasoningDivTab2 = null;

        try {
            await clientTab2.run({
                threadId: threadIdTab2,
                runId: 'run-tab2-' + Date.now(),
                messages: messageHistoryTab2,
                forwardedProps: {
                    context: 'this context is :' + Date.now(),
                    user:"context User"
                }
            }, {
                onRunStarted: () => {
                    console.log('Tab2 Run started');
                    currentAssistantDivTab2 = null;
                    currentReasoningDivTab2 = null;
                    reasoningContent = '';
                },
                onReasoningMessageStart: (messageId, role) => {
                    console.log('Tab2 Reasoning message start:', messageId, role);
                    hideTypingIndicatorTab2();
                    currentReasoningMessageId = messageId;
                    reasoningContent = '';
                    currentReasoningDivTab2 = null;
                },
                onReasoningContent: (delta, messageId) => {
                    console.log('Tab2 Reasoning content delta:', delta);
                    if (reasoningContent === '') {
                        appendMessageTab2('reasoning', delta);
                    } else {
                        appendMessageTab2('reasoning', delta, true);
                    }
                    reasoningContent += delta;
                },
                onReasoningMessageEnd: (messageId) => {
                    console.log('Tab2 Reasoning message end:', messageId);
                    currentReasoningDivTab2 = null;
                    reasoningContent = '';
                },
                onTextMessageStart: (messageId, role) => {
                    console.log('Tab2 Text message start:', messageId, role);
                    hideTypingIndicatorTab2();
                    currentMessageId = messageId;
                    assistantContent = '';
                    currentAssistantDivTab2 = null;
                },
                onTextContent: (delta) => {
                    console.log('Tab2 Text content delta:', delta);
                    if (assistantContent === '') {
                        appendMessageTab2('assistant', delta);
                    } else {
                        appendMessageTab2('assistant', delta, true);
                    }
                    assistantContent += delta;
                },
                onTextMessageEnd: (messageId) => {
                    console.log('Tab2 Text message end:', messageId);
                    if (assistantContent) {
                        messageHistoryTab2.push({
                            id: messageId,
                            role: 'assistant',
                            content: assistantContent
                        });
                    }
                    currentAssistantDivTab2 = null;
                },
                onToolCallStart: (toolCallId, toolName) => {
                    hideTypingIndicatorTab2();
                    currentAssistantDivTab2 = null;
                    appendMessageTab2('tool', `🔧 Calling tool: ${toolName}`);
                },
                onToolCallEnd: (toolCallId) => {
                    // Tool call completed
                },
                onError: (error) => {
                    hideTypingIndicatorTab2();
                    appendMessageTab2('error', `Error: ${error}`);
                },
                onRunFinished: () => {
                    console.log('Tab2 Run finished');
                    hideTypingIndicatorTab2();
                    setStatusTab2('ready', 'Ready');
                }
            });
        } catch (error) {
            console.error('Tab2 Error during agent run:', error);
            hideTypingIndicatorTab2();

            if (error.name === 'AbortError') {
                console.log('Tab2 Run was stopped by user');
                if (assistantContent) {
                    messageHistoryTab2.push({
                        id: currentMessageId || 'msg-tab2-stopped-' + Date.now(),
                        role: 'assistant',
                        content: assistantContent + ' [stopped]'
                    });
                }
                setStatusTab2('ready', 'Stopped');
            } else {
                appendMessageTab2('error', `Error: ${error.message}`);
                setStatusTab2('error', 'Error');
            }
        } finally {
            console.log('Tab2 Run complete, resetting state');
            isRunningTab2 = false;
            sendBtnTab2.style.display = 'inline-block';
            stopBtnTab2.style.display = 'none';
            hideTypingIndicatorTab2();
            currentAssistantDivTab2 = null;
            currentReasoningDivTab2 = null;
            reasoningContent = '';
            if (statusTextTab2.textContent === 'Running...') {
                setStatusTab2('ready', 'Ready');
            }
        }
    }

    function stopGenerationTab2() {
        if (isRunningTab2) {
            console.log('Tab2 User requested stop');
            setStatusTab2('stopping', 'Stopping...');
            clientTab2.abort();
        }
    }

    inputTab2.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessageTab2();
    });

    sendBtnTab2.addEventListener('click', sendMessageTab2);
    stopBtnTab2.addEventListener('click', stopGenerationTab2);

    input.focus();
</script>
</body>
</html>
